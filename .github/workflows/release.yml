name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 0.1.0) — tags the release v<version>"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-arm64
          - os: macos-13
            name: macos-x86_64
          - os: windows-latest
            name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      # default-members builds both tokex and the vendored rtk into target/release.
      - run: cargo build --release
      - name: Package tokex + rtk
        shell: bash
        run: |
          VER="${{ inputs.version }}"
          NAME="${{ matrix.name }}"
          mkdir dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "dist/tokex-${VER}-${NAME}.zip" ./target/release/tokex.exe ./target/release/rtk.exe
          else
            tar czf "dist/tokex-${VER}-${NAME}.tar.gz" -C target/release tokex rtk
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" dist/* \
            --repo "${{ github.repository }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes

name: Release
run-name: Release v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version, no leading v (e.g. 1.0.0) — tags the release v<version>"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Build graphify standalone executable so cotrex can embed it.
      - name: Install Python dependencies
        run: pip install pyinstaller graphifyy
      - name: Build graphify executable
        run: python -m PyInstaller --clean --noconfirm Scripts/graphify.spec
      - name: Copy graphify to target/release
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/graphify.exe target/release/graphify.exe
          else
            cp dist/graphify target/release/graphify
            chmod +x target/release/graphify
          fi
      # Build rtk first so cotrex's build.rs can embed it.
      - run: cargo build --release -p rtk
      - run: cargo build --release -p cotrex
      - name: Package cotrex
        shell: bash
        run: |
          VER="${{ inputs.version }}"; VER="${VER#v}"   # accept 1.0.0 or v1.0.0
          NAME="${{ matrix.name }}"
          mkdir dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "dist/cotrex-${VER}-${NAME}.zip" ./target/release/cotrex.exe
          else
            tar czf "dist/cotrex-${VER}-${NAME}.tar.gz" -C target/release cotrex
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ inputs.version }}"; VER="${VER#v}"   # accept 1.0.0 or v1.0.0
          gh release create "v${VER}" dist/* \
            --repo "${{ github.repository }}" \
            --title "Release v${VER}" \
            --generate-notes

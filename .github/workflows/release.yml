name: Release
run-name: Release v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version, no leading v (e.g. 1.0.0) — tags the release v<version>"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      # default-members builds both cotrex and the vendored rtk into target/release.
      - run: cargo build --release
      - name: Package cotrex + rtk
        shell: bash
        run: |
          VER="${{ inputs.version }}"; VER="${VER#v}"   # accept 1.0.0 or v1.0.0
          NAME="${{ matrix.name }}"
          mkdir dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "dist/cotrex-${VER}-${NAME}.zip" ./target/release/cotrex.exe ./target/release/rtk.exe
          else
            tar czf "dist/cotrex-${VER}-${NAME}.tar.gz" -C target/release cotrex rtk
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ inputs.version }}"; VER="${VER#v}"   # accept 1.0.0 or v1.0.0
          gh release create "v${VER}" dist/* \
            --repo "${{ github.repository }}" \
            --title "Release v${VER}" \
            --generate-notes

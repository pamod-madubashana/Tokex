name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # vendor/rtk must be present for cargo to load the workspace manifest.
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      # Test only our crate; vendored rtk is not our code and is heavy to compile.
      - run: cargo test -p cotrex

  graphify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install graphify
        run: pip install graphifyy
      - name: Update knowledge graph
        run: graphify update .
      - name: Upload graphify output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: graphify-out
          path: graphify-out/
          retention-days: 30
